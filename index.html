<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>VK Music Player</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Своя рамка окна -->
  <div id="titlebar">
    <div id="titlebar-drag">VK Music Player</div>
    <div id="titlebar-buttons">
      <button id="btn-min" class="icon-btn" title="Свернуть"><svg viewBox="0 0 24 24"><path d="M6 13q-.425 0-.712-.288T5 12t.288-.712T6 11h12q.425 0 .713.288T19 12t-.288.713T18 13z"/></svg></button>
      <button id="btn-max" class="icon-btn" title="Развернуть"><svg viewBox="0 0 24 24"><path d="M8 18q-.825 0-1.412-.587T6 16V4q0-.825.588-1.412T8 2h12q.825 0 1.413.588T22 4v12q0 .825-.587 1.413T20 18zm-4 4q-.825 0-1.412-.587T2 20V7q0-.425.288-.712T3 6t.713.288T4 7v13h13q.425 0 .713.288T18 21t-.288.713T17 22z"/></svg></button>
      <button id="btn-close" class="icon-btn" title="Свернуть в трей"><svg viewBox="0 0 24 24"><path d="m12 13.4l-4.9 4.9q-.275.275-.7.275t-.7-.275t-.275-.7t.275-.7l4.9-4.9l-4.9-4.9q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.9 4.9l4.9-4.9q.275-.275.7-.275t.7.275t.275.7t-.275.7L13.4 12l4.9 4.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275z"/></svg></button>
    </div>
  </div>

  <div id="app">
    <!-- Сайдбар -->
    <div id="sidebar">
      <div class="sidebar-title">Меню</div>
      <button class="nav-item active" data-view="home">Главная</button>
      <button class="nav-item" data-view="mymusic">Моя музыка</button>
      <button class="nav-item" data-view="search">Поиск</button>
      <button class="nav-item" data-view="playlists">Плейлисты</button>
      <!-- Старые пункты с data-url (Поиск/Рекомендации/Чарты) убраны: они
           грузили URL в скрытый VK — бесполезно для пользователя и ломает
           наблюдатель состояния плеера. -->

      <div class="sidebar-spacer"></div>
      <button id="debug-toggle" class="nav-item nav-item-secondary"><svg class="inline-icon debug-chevron" viewBox="0 0 24 24"><path d="M11.625 14.913q-.175-.063-.325-.213l-4.6-4.6q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l3.9 3.9l3.9-3.9q.275-.275.7-.275t.7.275t.275.7t-.275.7l-4.6 4.6q-.15.15-.325.213t-.375.062t-.375-.062"/></svg> Отладка</button>
      <div id="debug-section">
      <button id="btn-devtools" class="nav-item nav-item-secondary"><svg class="inline-icon" viewBox="0 0 24 24"><path d="M4.825 12.025L8.7 15.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-4.6-4.6q-.15-.15-.213-.325T2.426 12t.063-.375t.212-.325l4.6-4.6q.3-.3.713-.3t.712.3t.3.713t-.3.712zm14.35-.05L15.3 8.1q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.6 4.6q.15.15.213.325t.062.375t-.062.375t-.213.325l-4.6 4.6q-.3.3-.7.288t-.7-.313t-.3-.712t.3-.713z"/></svg> Открыть DevTools VK</button>
      <button id="btn-app-devtools" class="nav-item nav-item-secondary"><svg class="inline-icon" viewBox="0 0 24 24"><path d="M4.825 12.025L8.7 15.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-4.6-4.6q-.15-.15-.213-.325T2.426 12t.063-.375t.212-.325l4.6-4.6q.3-.3.713-.3t.712.3t.3.713t-.3.712zm14.35-.05L15.3 8.1q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.6 4.6q.15.15.213.325t.062.375t-.062.375t-.213.325l-4.6 4.6q-.3.3-.7.288t-.7-.313t-.3-.712t.3-.713z"/></svg> DevTools приложения (лог)</button>
      <button id="btn-toggle-vk" class="nav-item nav-item-secondary"><svg class="inline-icon" viewBox="0 0 24 24"><path d="M12 16q1.875 0 3.188-1.312T16.5 11.5t-1.312-3.187T12 7t-3.187 1.313T7.5 11.5t1.313 3.188T12 16m0-1.8q-1.125 0-1.912-.788T9.3 11.5t.788-1.912T12 8.8t1.913.788t.787 1.912t-.787 1.912T12 14.2m0 4.8q-3.65 0-6.65-1.988T1 11.5q1.35-2.725 4.35-4.712T12 4.8t6.65 1.988T23 11.5q-1.35 2.725-4.35 4.712T12 19"/></svg> Показать VK</button>
      </div>
    </div>

    <!-- Контент: наша оболочка по умолчанию + скрытая (но живая) страница VK -->
    <div id="content">
      <div id="shell-placeholder">
        <div id="home-view" class="app-view">
          <div class="home-title">Главная</div>
          <div class="home-cards">
            <button class="home-card" id="home-card-mix" data-home-action="mix">
              <svg class="home-card-icon" viewBox="0 0 24 24"><path d="M12 3C7.03 3 3 7.03 3 12c0 3.11 1.57 5.85 3.95 7.49l1.13-1.72C6.19 16.38 5 14.33 5 12c0-3.87 3.13-7 7-7s7 3.13 7 7c0 2.33-1.19 4.38-2.98 5.77l1.13 1.72C19.43 17.85 21 15.11 21 12c0-4.97-4.03-9-9-9zm0 4c-2.76 0-5 2.24-5 5c0 1.71.87 3.21 2.18 4.11l1.15-1.73C9.52 13.72 9 12.92 9 12c0-1.66 1.34-3 3-3s3 1.34 3 3c0 .92-.52 1.72-1.32 2.38l1.15 1.73C16.13 15.21 17 13.71 17 12c0-2.76-2.24-5-5-5zm0 4.5c-.28 0-.5.22-.5.5s.22.5.5.5s.5-.22.5-.5s-.22-.5-.5-.5z"/></svg>
              <div class="home-card-label">VK Микс</div>
              <div class="home-card-sub">Бесконечный поток музыки для вас</div>
              <svg class="home-card-play-hint" viewBox="0 0 24 24" fill="currentColor"><path d="M8 17.175V6.825q0-.425.3-.713t.7-.287q.125 0 .263.037t.262.113l8.15 5.175q.225.15.338.375t.112.475t-.112.475t-.338.375l-8.15 5.175q-.125.075-.262.113T9 18.175q-.4 0-.7-.288t-.3-.712"/></svg>
            </button>
            <button class="home-card" id="home-card-shuffle" data-home-action="shuffle">
              <svg class="home-card-icon" viewBox="0 0 24 24"><path d="M15 20q-.425 0-.712-.288T14 19t.288-.712T15 18h1.6l-2.475-2.475q-.3-.3-.287-.712t.312-.713t.713-.3t.712.3L18 16.55V15q0-.425.288-.712T19 14t.713.288T20 15v4q0 .425-.288.713T19 20zm-10.7-.3q-.275-.275-.275-.7t.275-.7L16.6 6H15q-.425 0-.712-.288T14 5t.288-.712T15 4h4q.425 0 .713.288T20 5v4q0 .425-.288.713T19 10t-.712-.288T18 9V7.4L5.7 19.7q-.275.275-.7.275t-.7-.275m-.025-14Q4 5.425 4 5t.275-.7t.687-.275t.713.275l4.2 4.175q.275.275.288.688t-.288.712q-.275.275-.7.275t-.7-.275z"/></svg>
              <div class="home-card-label">Шафл моей музыки</div>
              <div class="home-card-sub">Случайный трек из «Моей музыки»</div>
              <svg class="home-card-play-hint" viewBox="0 0 24 24" fill="currentColor"><path d="M8 17.175V6.825q0-.425.3-.713t.7-.287q.125 0 .263.037t.262.113l8.15 5.175q.225.15.338.375t.112.475t-.112.475t-.338.375l-8.15 5.175q-.125.075-.262.113T9 18.175q-.4 0-.7-.288t-.3-.712"/></svg>
            </button>
          </div>
          <div id="home-status"></div>
          <div class="home-section hidden" id="home-recent-section">
            <div class="home-section-header">Недавно прослушанные</div>
            <div class="home-track-grid" id="home-recent-list"></div>
          </div>
          <div class="home-section hidden" id="home-mytracks-section">
            <div class="home-section-header">
              Мои треки
              <button class="home-section-link" id="home-mytracks-all">Показать все</button>
            </div>
            <div class="home-track-grid" id="home-mytracks-list"></div>
          </div>
        </div>

        <div id="mymusic-view" class="app-view hidden">
          <div class="mymusic-header">
            <div class="mymusic-title-group">
              <div class="home-title">Моя музыка</div>
              <span id="mymusic-count"></span>
              <button id="mymusic-shuffle" class="icon-btn" title="Перемешать"><svg viewBox="0 0 24 24"><path d="M15 20q-.425 0-.712-.288T14 19t.288-.712T15 18h1.6l-2.475-2.475q-.3-.3-.287-.712t.312-.713t.713-.3t.712.3L18 16.55V15q0-.425.288-.712T19 14t.713.288T20 15v4q0 .425-.288.713T19 20zm-10.7-.3q-.275-.275-.275-.7t.275-.7L16.6 6H15q-.425 0-.712-.288T14 5t.288-.712T15 4h4q.425 0 .713.288T20 5v4q0 .425-.288.713T19 10t-.712-.288T18 9V7.4L5.7 19.7q-.275.275-.7.275t-.7-.275m-.025-14Q4 5.425 4 5t.275-.7t.687-.275t.713.275l4.2 4.175q.275.275.288.688t-.288.712q-.275.275-.7.275t-.7-.275z"/></svg></button>
            </div>
            <input id="mymusic-search" type="text" placeholder="Поиск по моим трекам">
          </div>
          <div id="mymusic-status"></div>
          <div id="mymusic-track-list"></div>
          <button id="mymusic-scroll-top" class="mymusic-scroll-top-btn" title="Наверх"><svg viewBox="0 0 24 24"><path d="M11 20v-9.15L7.4 14.45q-.3.3-.7.288t-.7-.313q-.275-.3-.288-.7t.288-.7l5.3-5.3q.15-.15.325-.212T12 7.3t.375.063t.325.212l5.3 5.3q.275.275.275.688t-.275.712q-.3.3-.712.3t-.713-.3L13 10.85V20q0 .425-.288.713T12 21t-.712-.288T11 20"/></svg></button>
        </div>

        <div id="search-view" class="app-view hidden">
          <div class="mymusic-header">
            <div class="home-title">Поиск</div>
            <div class="search-input-wrap">
              <input id="search-input" type="text" placeholder="Поиск музыки ВКонтакте" autocomplete="off">
              <div id="search-suggestions" class="hidden"></div>
            </div>
          </div>
          <div id="search-status"></div>
          <div id="search-track-list"></div>
        </div>

        <div id="playlists-view" class="app-view hidden">
          <!-- Экран 1: сетка плейлистов -->
          <div id="playlists-home">
            <div class="mymusic-header">
              <div class="home-title">Плейлисты</div>
              <input id="playlists-filter" type="text" placeholder="Фильтр по названию или автору">
            </div>
            <div id="playlists-status"></div>
            <div id="playlists-grid"></div>
          </div>
          <!-- Экран 2: страница плейлиста (VK-модалка при этом открыта в
               скрытом webview и служит источником данных/мишенью для кликов) -->
          <div id="playlist-detail" class="hidden">
            <button id="plcard-back" class="detail-back-btn"><svg viewBox="0 0 24 24"><path d="m10.8 12l3.9 3.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-4.6-4.6q-.15-.15-.212-.325T8.425 12t.063-.375t.212-.325l4.6-4.6q.275-.275.7-.275t.7.275t.275.7t-.275.7z"/></svg> Плейлисты</button>
            <div id="plcard-header">
              <div id="plcard-cover"></div>
              <div id="plcard-info">
                <div id="plcard-title"></div>
                <div id="plcard-sub"></div>
                <div id="plcard-stats"></div>
                <div id="plcard-actions">
                  <button class="plcard-action-btn" data-plcard-action="play"><svg viewBox="0 0 24 24"><path d="M8 17.175V6.825q0-.425.3-.713t.7-.287q.125 0 .263.037t.262.113l8.15 5.175q.225.15.338.375t.112.475t-.112.475t-.338.375l-8.15 5.175q-.125.075-.262.113T9 18.175q-.4 0-.7-.288t-.3-.712"/></svg> Слушать</button>
                  <button class="plcard-action-btn" data-plcard-action="shuffle"><svg viewBox="0 0 24 24"><path d="M15 20q-.425 0-.712-.288T14 19t.288-.712T15 18h1.6l-2.475-2.475q-.3-.3-.287-.712t.312-.713t.713-.3t.712.3L18 16.55V15q0-.425.288-.712T19 14t.713.288T20 15v4q0 .425-.288.713T19 20zm-10.7-.3q-.275-.275-.275-.7t.275-.7L16.6 6H15q-.425 0-.712-.288T14 5t.288-.712T15 4h4q.425 0 .713.288T20 5v4q0 .425-.288.713T19 10t-.712-.288T18 9V7.4L5.7 19.7q-.275.275-.7.275t-.7-.275m-.025-14Q4 5.425 4 5t.275-.7t.687-.275t.713.275l4.2 4.175q.275.275.288.688t-.288.712q-.275.275-.7.275t-.7-.275z"/></svg> Перемешать</button>
                  <button class="plcard-action-btn" data-plcard-action="mix" title="Микс по мотивам плейлиста"><svg viewBox="0 0 24 24"><path d="M9.5 21q-2.3 0-3.9-1.6T4 15.5t1.6-3.9t3.9-1.6q.575 0 1.063.088T11.5 10.4V3h6.75q.325 0 .538.213T19 3.75v2.5q0 .325-.213.538T18.25 7H14v8.5q0 2.3-1.6 3.9T9.5 21"/></svg> Похожие</button>
                </div>
              </div>
            </div>
            <div id="plcard-status"></div>
            <div id="plcard-tracks"></div>
          </div>
        </div>
      </div>
      <webview id="vkview" src="https://vk.com/audio" partition="persist:vkmusic"></webview>
      <!-- Шторка на время автоматизации: пока VK кратко показывается для
           доверенных кликов/догрузки, пользователь видит её, а не голый VK.
           Доверенные клики (sendInputEvent) идут в webview напрямую, минуя её. -->
      <div id="vk-curtain">
        <div class="spinner"></div>
        <div id="vk-curtain-label">Запускаю…</div>
      </div>
    </div>
  </div>

  <!-- Нижняя панель плеера -->
  <div id="player-bar">
    <div id="progress-scrubber"><div id="progress-buffered-mini"></div><div id="progress-fill-mini"></div></div>
    <div id="player-bar-main">
      <div id="now-playing-mini">
        <img id="cover-mini" src="" alt="">
        <div id="track-info-mini">
          <div id="track-title-mini">Ничего не играет</div>
          <div id="track-artist-mini">Открой трек в VK Музыке</div>
        </div>
      </div>
      <div id="controls-center">
      <div id="controls">
        <button class="icon-btn small btn-shuffle" data-action="shuffle" title="Вперемешку"><svg viewBox="0 0 24 24"><path d="M15 20q-.425 0-.712-.288T14 19t.288-.712T15 18h1.6l-2.475-2.475q-.3-.3-.287-.712t.312-.713t.713-.3t.712.3L18 16.55V15q0-.425.288-.712T19 14t.713.288T20 15v4q0 .425-.288.713T19 20zm-10.7-.3q-.275-.275-.275-.7t.275-.7L16.6 6H15q-.425 0-.712-.288T14 5t.288-.712T15 4h4q.425 0 .713.288T20 5v4q0 .425-.288.713T19 10t-.712-.288T18 9V7.4L5.7 19.7q-.275.275-.7.275t-.7-.275m-.025-14Q4 5.425 4 5t.275-.7t.687-.275t.713.275l4.2 4.175q.275.275.288.688t-.288.712q-.275.275-.7.275t-.7-.275z"/></svg></button>
        <button class="icon-btn btn-prev" data-action="prev" title="Предыдущий"><svg viewBox="0 0 24 24"><path d="M5.5 17V7q0-.425.288-.712T6.5 6t.713.288T7.5 7v10q0 .425-.288.713T6.5 18t-.712-.288T5.5 17m11.45-.025l-6.2-4.15q-.225-.15-.337-.362T10.3 12t.113-.462t.337-.363l6.2-4.15q.125-.1.275-.125t.275-.025q.4 0 .7.275t.3.725v8.25q0 .45-.3.725t-.7.275q-.125 0-.275-.025t-.275-.125"/></svg></button>
        <button class="icon-btn btn-playpause" data-action="playpause" title="Play/Pause"><svg viewBox="0 0 24 24"><path d="M8 17.175V6.825q0-.425.3-.713t.7-.287q.125 0 .263.037t.262.113l8.15 5.175q.225.15.338.375t.112.475t-.112.475t-.338.375l-8.15 5.175q-.125.075-.262.113T9 18.175q-.4 0-.7-.288t-.3-.712"/></svg></button>
        <button class="icon-btn btn-next" data-action="next" title="Следующий"><svg viewBox="0 0 24 24"><path d="M16.5 17V7q0-.425.288-.712T17.5 6t.713.288T18.5 7v10q0 .425-.288.713T17.5 18t-.712-.288T16.5 17m-11-.875v-8.25q0-.45.3-.725t.7-.275q.125 0 .275.025t.275.125l6.2 4.15q.225.15.338.363T13.7 12t-.112.463t-.338.362l-6.2 4.15q-.125.1-.275.125t-.275.025q-.4 0-.7-.275t-.3-.725"/></svg></button>
        <button class="icon-btn small btn-repeat" data-action="repeat" title="Повтор"><svg viewBox="0 0 24 24"><path d="m6.85 19l.85.85q.3.3.288.7t-.288.7q-.3.3-.712.313t-.713-.288L3.7 18.7q-.15-.15-.213-.325T3.426 18t.063-.375t.212-.325l2.575-2.575q.3-.3.713-.287t.712.312q.275.3.288.7t-.288.7l-.85.85H17v-3q0-.425.288-.712T18 13t.713.288T19 14v3q0 .825-.587 1.413T17 19zm10.3-12H7v3q0 .425-.288.713T6 11t-.712-.288T5 10V7q0-.825.588-1.412T7 5h10.15l-.85-.85q-.3-.3-.288-.7t.288-.7q.3-.3.712-.312t.713.287L20.3 5.3q.15.15.213.325t.062.375t-.062.375t-.213.325l-2.575 2.575q-.3.3-.712.288T16.3 9.25q-.275-.3-.288-.7t.288-.7z"/></svg></button>
      </div>
        <div id="time-readout">0:00</div>
      </div>
      <div id="right-controls">
        <div class="ctl-group">
        <button class="icon-btn tiny btn-dislike" data-action="dislike" title="Не нравится"><svg viewBox="0 0 24 24"><path d="M3 16q-.8 0-1.4-.6T1 14v-2q0-.175.05-.375t.1-.375l3-7.05q.225-.5.75-.85T6 3h11v13l-6 5.95q-.375.375-.888.438t-.987-.188t-.7-.7t-.1-.925L9.45 16zm12-.85V5H6l-3 7v2h9l-1.35 5.5zM20 3q.825 0 1.413.588T22 5v9q0 .825-.587 1.413T20 16h-3v-2h3V5h-3V3zm-5 2v10.15z"/></svg></button>
        <button class="icon-btn tiny btn-like" data-action="like" title="В мою музыку"><svg viewBox="0 0 24 24"><path d="M11.288 20.2q-.363-.125-.638-.4l-1.725-1.575q-2.65-2.425-4.787-4.812T2 8.15Q2 5.8 3.575 4.225T7.5 2.65q1.325 0 2.5.562t2 1.538q.825-.975 2-1.537t2.5-.563q2.35 0 3.925 1.575T22 8.15q0 2.875-2.125 5.275T15.05 18.25l-1.7 1.55q-.275.275-.637.4t-.713.125t-.712-.125M11.05 6.75q-.725-1.025-1.55-1.562t-2-.538q-1.5 0-2.5 1t-1 2.5q0 1.3.925 2.763t2.213 2.837t2.65 2.575T12 18.3q.85-.775 2.213-1.975t2.65-2.575t2.212-2.837T20 8.15q0-1.5-1-2.5t-2.5-1q-1.175 0-2 .538T12.95 6.75q-.175.25-.425.375T12 7.25t-.525-.125t-.425-.375m.95 4.725"/></svg></button>
        </div>
        <div class="ctl-group">
