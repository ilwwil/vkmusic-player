<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>VK Music Player (unofficial)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Своя рамка окна -->
  <div id="titlebar">
    <div id="titlebar-drag">VK MUSIC PLAYER <span class="titlebar-unofficial">unofficial</span></div>
    <div id="titlebar-buttons">
      <button id="btn-min" title="Свернуть"><svg viewBox="0 0 24 24"><path d="M6 13q-.425 0-.712-.288T5 12t.288-.712T6 11h12q.425 0 .713.288T19 12t-.288.713T18 13z"/></svg></button>
      <button id="btn-max" title="Развернуть"><svg viewBox="0 0 24 24"><path d="M8 18q-.825 0-1.412-.587T6 16V4q0-.825.588-1.412T8 2h12q.825 0 1.413.588T22 4v12q0 .825-.587 1.413T20 18zm-4 4q-.825 0-1.412-.587T2 20V7q0-.425.288-.712T3 6t.713.288T4 7v13h13q.425 0 .713.288T18 21t-.288.713T17 22z"/></svg></button>
      <button id="btn-close" title="Свернуть в трей"><svg viewBox="0 0 24 24"><path d="m12 13.4l-4.9 4.9q-.275.275-.7.275t-.7-.275t-.275-.7t.275-.7l4.9-4.9l-4.9-4.9q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.9 4.9l4.9-4.9q.275-.275.7-.275t.7.275t.275.7t-.275.7L13.4 12l4.9 4.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275z"/></svg></button>
    </div>
  </div>

  <div id="app">
    <!-- Иконочная рейка навигации -->
    <div id="sidebar">
      <button class="nav-item active" data-view="home" title="Главная"><svg viewBox="0 0 24 24"><path d="M6 19h3v-5q0-.425.288-.712T10 13h4q.425 0 .713.288T15 14v5h3v-9l-6-4.5L6 10zm-2 0v-9q0-.475.213-.9t.587-.7l6-4.5q.525-.4 1.2-.4t1.2.4l6 4.5q.375.275.588.7T20 10v9q0 .825-.588 1.413T18 21h-4q-.425 0-.712-.287T13 20v-5h-2v5q0 .425-.287.713T10 21H6q-.825 0-1.412-.587T4 19"/></svg></button>
      <button class="nav-item" data-view="mymusic" title="Моя музыка"><svg viewBox="0 0 24 24"><path d="M9.5 21q-2.3 0-3.9-1.6T4 15.5t1.6-3.9t3.9-1.6q.575 0 1.063.088T11.5 10.4V3h6.75q.325 0 .538.213T19 3.75v2.5q0 .325-.213.538T18.25 7H14v8.5q0 2.3-1.6 3.9T9.5 21"/></svg></button>
      <button class="nav-item" data-view="search" title="Поиск"><svg viewBox="0 0 24 24"><path d="M9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l5.6 5.6q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-5.6-5.6q-.75.6-1.725.95T9.5 16m0-2q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/></svg></button>
      <button class="nav-item" data-view="playlists" title="Плейлисты"><svg viewBox="0 0 24 24"><path d="M6 15h6q.425 0 .713.288T13 16t-.288.713T12 17H6q-.425 0-.712-.288T5 16t.288-.712T6 15m0-4h9q.425 0 .713.288T16 12t-.288.713T15 13H6q-.425 0-.712-.288T5 12t.288-.712T6 11m0-4h9q.425 0 .713.288T16 8t-.288.713T15 9H6q-.425 0-.712-.288T5 8t.288-.712T6 7"/></svg></button>

      <div class="sidebar-spacer"></div>
      <button id="debug-toggle" class="nav-item nav-item-secondary" title="Отладка"><svg viewBox="0 0 24 24"><path d="M4.825 12.025L8.7 15.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-4.6-4.6q-.15-.15-.213-.325T2.426 12t.063-.375t.212-.325l4.6-4.6q.3-.3.713-.3t.712.3t.3.713t-.3.712zm14.35-.05L15.3 8.1q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.6 4.6q.15.15.213.325t.062.375t-.062.375t-.213.325l-4.6 4.6q-.3.3-.7.288t-.7-.313t-.3-.712t.3-.713z"/></svg></button>
      <div id="debug-section">
        <button id="btn-devtools" class="nav-item nav-item-secondary"><svg class="inline-icon" viewBox="0 0 24 24"><path d="M4.825 12.025L8.7 15.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-4.6-4.6q-.15-.15-.213-.325T2.426 12t.063-.375t.212-.325l4.6-4.6q.3-.3.713-.3t.712.3t.3.713t-.3.712zm14.35-.05L15.3 8.1q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.6 4.6q.15.15.213.325t.062.375t-.062.375t-.213.325l-4.6 4.6q-.3.3-.7.288t-.7-.313t-.3-.712t.3-.713z"/></svg> Открыть DevTools VK</button>
        <button id="btn-app-devtools" class="nav-item nav-item-secondary"><svg class="inline-icon" viewBox="0 0 24 24"><path d="M4.825 12.025L8.7 15.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-4.6-4.6q-.15-.15-.213-.325T2.426 12t.063-.375t.212-.325l4.6-4.6q.3-.3.713-.3t.712.3t.3.713t-.3.712zm14.35-.05L15.3 8.1q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.6 4.6q.15.15.213.325t.062.375t-.062.375t-.213.325l-4.6 4.6q-.3.3-.7.288t-.7-.313t-.3-.712t.3-.713z"/></svg> DevTools приложения (лог)</button>
        <button id="btn-toggle-vk" class="nav-item nav-item-secondary"><svg class="inline-icon" viewBox="0 0 24 24"><path d="M12 16q1.875 0 3.188-1.312T16.5 11.5t-1.312-3.187T12 7t-3.187 1.313T7.5 11.5t1.313 3.188T12 16m0-1.8q-1.125 0-1.912-.788T9.3 11.5t.788-1.912T12 8.8t1.913.788t.787 1.912t-.787 1.912T12 14.2m0 4.8q-3.65 0-6.65-1.988T1 11.5q1.35-2.725 4.35-4.712T12 4.8t6.65 1.988T23 11.5q-1.35 2.725-4.35 4.712T12 19"/></svg> Показать VK</button>
      </div>
    </div>

    <!-- Контент: наша оболочка по умолчанию + скрытая (но живая) страница VK -->
    <div id="content">
      <div id="shell-placeholder">

        <!-- Глобальный поиск сверху: история + подсказки VK -->
        <div id="global-search">
          <div id="global-search-box">
            <div id="global-search-field">
              <svg viewBox="0 0 24 24"><path d="M9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l5.6 5.6q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-5.6-5.6q-.75.6-1.725.95T9.5 16m0-2q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/></svg>
              <input id="global-search-input" type="text" placeholder="Поиск музыки" autocomplete="off">
              <button id="global-search-clear" class="hidden" title="Очистить"><svg viewBox="0 0 24 24"><path d="m12 13.4l-4.9 4.9q-.275.275-.7.275t-.7-.275t-.275-.7t.275-.7l4.9-4.9l-4.9-4.9q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.9 4.9l4.9-4.9q.275-.275.7-.275t.7.275t.275.7t-.275.7L13.4 12l4.9 4.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275z"/></svg></button>
            </div>
            <div id="search-suggestions" class="hidden"></div>
          </div>
        </div>

        <div id="views-host">
        <div id="home-view" class="app-view">
          <!-- Хиро: VK Микс (бегущие волны в цвет акцента) -->
          <button id="home-card-mix" data-home-action="mix">
            <div class="hero-sheen"></div>
            <svg class="hero-wave hero-wave-1" viewBox="0 0 1200 132" preserveAspectRatio="none"><path d="M0,70 C90,20 180,120 270,70 C360,20 450,120 540,70 C630,20 720,120 810,70 C900,20 990,120 1080,70 C1170,20 1260,120 1350,70 C1440,20 1530,120 1620,70 C1710,20 1800,120 1890,70 C1980,20 2070,120 2160,70 C2250,20 2340,120 2400,70" fill="none" stroke-width="3"/></svg>
            <svg class="hero-wave hero-wave-2" viewBox="0 0 1200 132" preserveAspectRatio="none"><path d="M0,80 C90,60 180,100 270,80 C360,60 450,100 540,80 C630,60 720,100 810,80 C900,60 990,100 1080,80 C1170,60 1260,100 1350,80 C1440,60 1530,100 1620,80 C1710,60 1800,100 1890,80 C1980,60 2070,100 2160,80 C2250,60 2340,100 2400,80" fill="none" stroke-width="1.4"/></svg>
            <svg class="hero-wave hero-wave-3" viewBox="0 0 1200 132" preserveAspectRatio="none"><path d="M0,88 C90,72 180,100 270,88 C360,72 450,100 540,88 C630,72 720,100 810,88 C900,72 990,100 1080,88 C1170,72 1260,100 1350,88 C1440,72 1530,100 1620,88 C1710,72 1800,100 1890,88 C1980,72 2070,100 2160,88 C2250,72 2340,100 2400,88" fill="none" stroke-width="1"/></svg>
            <div class="hero-shade"></div>
            <div class="hero-lead">
              <div class="hero-play"><svg viewBox="0 0 24 24"><path d="M8 17.175V6.825q0-.425.3-.713t.7-.287q.125 0 .263.037t.262.113l8.15 5.175q.225.15.338.375t.112.475t-.112.475t-.338.375l-8.15 5.175q-.125.075-.262.113T9 18.175q-.4 0-.7-.288t-.3-.712"/></svg></div>
              <div>
                <div class="hero-name">VK Микс</div>
                <div class="hero-sub">Бесконечный поток музыки для вас</div>
              </div>
            </div>
            <div class="hero-chips"><div></div><div></div><div></div><div></div><div></div></div>
          </button>

          <!-- Баннеры -->
          <div class="home-cards">
            <button class="home-card" id="home-card-shuffle" data-home-action="shuffle">
              <div class="shuffle-glow"></div>
              <div class="bob bob-1"></div><div class="bob bob-2"></div><div class="bob bob-3"></div><div class="bob bob-4"></div>
              <div class="card-shade"></div>
              <div class="card-lead">
                <svg viewBox="0 0 24 24"><path d="M15 20q-.425 0-.712-.288T14 19t.288-.712T15 18h1.6l-2.475-2.475q-.3-.3-.287-.712t.312-.713t.713-.3t.712.3L18 16.55V15q0-.425.288-.712T19 14t.713.288T20 15v4q0 .425-.288.713T19 20zm-10.7-.3q-.275-.275-.275-.7t.275-.7L16.6 6H15q-.425 0-.712-.288T14 5t.288-.712T15 4h4q.425 0 .713.288T20 5v4q0 .425-.288.713T19 10t-.712-.288T18 9V7.4L5.7 19.7q-.275.275-.7.275t-.7-.275m-.025-14Q4 5.425 4 5t.275-.7t.687-.275t.713.275l4.2 4.175q.275.275.288.688t-.288.712q-.275.275-.7.275t-.7-.275z"/></svg>
                <div class="home-card-label">Шафл моей музыки</div>
                <div class="home-card-sub">Случайный трек из вашей коллекции</div>
              </div>
            </button>
            <button class="home-card" id="home-card-gomymusic">
              <div class="card-bars"><div style="height:38%"></div><div style="height:62%"></div><div style="height:45%"></div><div style="height:75%"></div><div style="height:55%"></div><div style="height:90%"></div><div style="height:65%"></div><div style="height:100%"></div><div style="height:48%"></div></div>
              <div class="card-shade"></div>
              <div class="card-lead">
                <svg viewBox="0 0 24 24"><path d="M9.5 21q-2.3 0-3.9-1.6T4 15.5t1.6-3.9t3.9-1.6q.575 0 1.063.088T11.5 10.4V3h6.75q.325 0 .538.213T19 3.75v2.5q0 .325-.213.538T18.25 7H14v8.5q0 2.3-1.6 3.9T9.5 21"/></svg>
                <div class="home-card-label">Моя музыка</div>
                <div class="home-card-sub" id="home-library-sub">Вся ваша коллекция</div>
              </div>
            </button>
          </div>
          <div id="home-status"></div>
          <div class="home-section hidden" id="home-recent-section">
            <div class="home-section-header">Недавно прослушанные</div>
            <div class="home-track-grid" id="home-recent-list"></div>
          </div>
          <div class="home-section hidden" id="home-mytracks-section">
            <div class="home-section-header">
              Мои треки
              <button class="home-section-link" id="home-mytracks-all">Показать все</button>
            </div>
            <div class="home-track-grid" id="home-mytracks-list"></div>
          </div>
        </div>

        <div id="mymusic-view" class="app-view hidden">
          <!-- Хиро с мозаикой обложек -->
          <div id="mymusic-hero">
            <div class="hero-tiles">
              <div></div><div></div><div></div><div></div><div></div>
              <div></div><div></div><div></div><div></div><div></div>
              <div></div><div></div><div></div><div></div><div></div>
            </div>
            <div class="hero-shade"></div>
            <div class="hero-sheen"></div>
            <div class="hero-lead">
              <div>
                <div class="mymusic-title-group">
                  <div class="home-title">Моя музыка</div>
                  <span id="mymusic-count"></span>
                </div>
                <div class="hero-sub">Вся ваша музыка в одном месте</div>
              </div>
              <button id="mymusic-shuffle" title="Перемешать"><svg viewBox="0 0 24 24"><path d="M15 20q-.425 0-.712-.288T14 19t.288-.712T15 18h1.6l-2.475-2.475q-.3-.3-.287-.712t.312-.713t.713-.3t.712.3L18 16.55V15q0-.425.288-.712T19 14t.713.288T20 15v4q0 .425-.288.713T19 20zm-10.7-.3q-.275-.275-.275-.7t.275-.7L16.6 6H15q-.425 0-.712-.288T14 5t.288-.712T15 4h4q.425 0 .713.288T20 5v4q0 .425-.288.713T19 10t-.712-.288T18 9V7.4L5.7 19.7q-.275.275-.7.275t-.7-.275m-.025-14Q4 5.425 4 5t.275-.7t.687-.275t.713.275l4.2 4.175q.275.275.288.688t-.288.712q-.275.275-.7.275t-.7-.275z"/></svg> Перемешать</button>
            </div>
          </div>
          <div class="mymusic-header">
            <input id="mymusic-search" type="text" placeholder="Поиск по моим трекам">
          </div>
          <div id="mymusic-status"></div>
          <div id="mymusic-track-list"></div>
          <button id="mymusic-scroll-top" class="mymusic-scroll-top-btn" title="Наверх"><svg viewBox="0 0 24 24"><path d="M12 8l-6 6l1.4 1.4L12 10.8l4.6 4.6L18 14z"/></svg></button>
        </div>

        <div id="search-view" class="app-view hidden">
          <div class="home-title">Поиск</div>
          <div class="search-input-wrap">
            <div class="search-glow"></div>
            <div class="search-field">
              <svg viewBox="0 0 24 24"><path d="M9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l5.6 5.6q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-5.6-5.6q-.75.6-1.725.95T9.5 16m0-2q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"/></svg>
              <input id="search-input" type="text" placeholder="Поиск музыки ВКонтакте" autocomplete="off">
              <button id="search-submit">Найти</button>
            </div>
          </div>
          <div id="search-status"></div>
          <div id="search-track-list"></div>
        </div>

        <div id="playlists-view" class="app-view hidden">
          <!-- Экран 1: сетка плейлистов -->
          <div id="playlists-home">
            <div class="mymusic-header">
              <div class="mymusic-title-group">
                <div class="home-title">Плейлисты</div>
                <span id="playlists-count"></span>
              </div>
              <input id="playlists-filter" type="text" placeholder="Фильтр по названию или автору">
            </div>
            <div id="playlists-status"></div>
            <div id="playlists-grid"></div>
          </div>
          <!-- Экран 2: страница плейлиста (VK-модалка при этом открыта в
               скрытом webview и служит источником данных/мишенью для кликов) -->
          <div id="playlist-detail" class="hidden">
            <button id="plcard-back" class="detail-back-btn"><svg viewBox="0 0 24 24"><path d="m10.8 12l3.9 3.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-4.6-4.6q-.15-.15-.212-.325T8.425 12t.063-.375t.212-.325l4.6-4.6q.275-.275.7-.275t.7.275t.275.7t-.275.7z"/></svg> <span id="plcard-back-label">Плейлисты</span></button>
            <div id="plcard-header">
              <div id="plcard-cover"></div>
              <div id="plcard-info">
                <div id="plcard-title"></div>
                <div id="plcard-sub"></div>
                <div id="plcard-stats"></div>
                <div id="plcard-actions">
                  <button class="plcard-action-btn" data-plcard-action="play"><svg viewBox="0 0 24 24"><path d="M8 17.175V6.825q0-.425.3-.713t.7-.287q.125 0 .263.037t.262.113l8.15 5.175q.225.15.338.375t.112.475t-.112.475t-.338.375l-8.15 5.175q-.125.075-.262.113T9 18.175q-.4 0-.7-.288t-.3-.712"/></svg> Слушать</button>
                  <button class="plcard-action-btn" data-plcard-action="shuffle"><svg viewBox="0 0 24 24"><path d="M15 20q-.425 0-.712-.288T14 19t.288-.712T15 18h1.6l-2.475-2.475q-.3-.3-.287-.712t.312-.713t.713-.3t.712.3L18 16.55V15q0-.425.288-.712T19 14t.713.288T20 15v4q0 .425-.288.713T19 20zm-10.7-.3q-.275-.275-.275-.7t.275-.7L16.6 6H15q-.425 0-.712-.288T14 5t.288-.712T15 4h4q.425 0 .713.288T20 5v4q0 .425-.288.713T19 10t-.712-.288T18 9V7.4L5.7 19.7q-.275.275-.7.275t-.7-.275m-.025-14Q4 5.425 4 5t.275-.7t.687-.275t.713.275l4.2 4.175q.275.275.288.688t-.288.712q-.275.275-.7.275t-.7-.275z"/></svg> Перемешать</button>
                  <button class="plcard-action-btn" data-plcard-action="mix" title="Микс по мотивам плейлиста"><svg viewBox="0 0 24 24"><path d="M9.5 21q-2.3 0-3.9-1.6T4 15.5t1.6-3.9t3.9-1.6q.575 0 1.063.088T11.5 10.4V3h6.75q.325 0 .538.213T19 3.75v2.5q0 .325-.213.538T18.25 7H14v8.5q0 2.3-1.6 3.9T9.5 21"/></svg> Похожие</button>
                </div>
              </div>
            </div>
            <div id="plcard-status"></div>
            <div id="plcard-tracks"></div>
          </div>
        </div>

        <!-- Страница артиста: открывается SPA-переходом по ссылке из поиска
             (не рвёт воспроизведение), назад — по хлебной крошке VK "Музыка" -->
        <div id="artist-view" class="app-view hidden">
          <button id="artist-back" class="detail-back-btn"><svg viewBox="0 0 24 24"><path d="m10.8 12l3.9 3.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275l-4.6-4.6q-.15-.15-.212-.325T8.425 12t.063-.375t.212-.325l4.6-4.6q.275-.275.7-.275t.7.275t.275.7t-.275.7z"/></svg> Назад</button>
          <div id="artist-hero">
            <div id="artist-hero-bg"></div>
            <div id="artist-hero-shade"></div>
            <div id="artist-hero-name"></div>
          </div>
          <div id="artist-status"></div>
          <div id="artist-body">
            <div id="artist-popular-section" class="hidden">
              <div class="search-section-title">Популярное</div>
              <div id="artist-popular-list" class="search-track-grid"></div>
            </div>
            <div id="artist-releases-section" class="hidden">
              <div class="search-section-title">Релизы</div>
              <div id="artist-releases-list" class="search-carousel"></div>
            </div>
          </div>
        </div>
        </div>
      </div>
      <webview id="vkview" src="https://vk.com/audio" partition="persist:vkmusic"></webview>
      <!-- Тост на время автоматизации: маленькая плашка снизу-по-центру.
           Доверенные клики (sendInputEvent) идут в webview напрямую, минуя её. -->
      <div id="vk-curtain">
        <div class="spinner"></div>
        <div id="vk-curtain-label">Запускаю…</div>
      </div>
    </div>
  </div>

  <!-- Нижняя панель плеера -->
  <div id="player-bar">
